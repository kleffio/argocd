apiVersion: v1
kind: ConfigMap
metadata:
  name: kimai-saml-config
  namespace: kimai
data:
  local.yaml: |
    kimai:
      saml:
        activate: true
        provider: authentik
        title: "Login with SAML"
        mapping:
          - { saml: '$http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress', kimai: email }
          - { saml: '$http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name', kimai: alias }
        roles:
          resetOnLogin: true
          attribute: 'http://schemas.xmlsoap.org/claims/Group'
          mapping:
            - { saml: admin.group, kimai: ROLE_ADMIN }
        connection:
          baseurl: "https://kimai.kleff.ca/auth/saml/"
          idp:
            entityId: "https://auth.kleff.ca/"
            singleSignOnService:
              url: "https://auth.kleff.ca/application/saml/kimai/sso/binding/redirect/"
              binding: "urn:oasis:names:tc:SAML:2.0:bindings:HTTP-Redirect"
            x509cert: "KIMAI_CERT"
          sp:
            entityId: "https://kimai.kleff.ca/auth/saml"
            assertionConsumerService:
              url: "https://kimai.kleff.ca/auth/saml/acs"
              binding: "urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST"
            singleLogoutService:
              url: "https://kimai.kleff.ca/auth/saml/logout"
              binding: "urn:oasis:names:tc:SAML:2.0:bindings:HTTP-Redirect"
          strict: false
          debug: true
          security:
            nameIdEncrypted: false
            authnRequestsSigned: false
            logoutRequestSigned: false
            logoutResponseSigned: false
            wantMessagesSigned: false
            wantAssertionsSigned: false
            wantNameIdEncrypted: false
            requestedAuthnContext: false
            signMetadata: false
            wantXMLValidation: true
            signatureAlgorithm: "http://www.w3.org/2001/04/xmldsig-more#rsa-sha256"
            digestAlgorithm: "http://www.w3.org/2001/04/xmlenc#sha256"