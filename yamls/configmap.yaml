apiVersion: v1
kind: ConfigMap
metadata:
  name: kimai-saml-config
  namespace: kimai
data:
  local.yaml: |
    kimai:
      saml:
        activate: true
        title: "Login with SAML"
        connection:
          baseurl: "https://kimai.kleff.ca/auth/saml/"
          sp:
            entityId: "https://kimai.kleff.ca/auth/saml"
            assertionConsumerService:
              url: "https://kimai.kleff.ca/auth/saml/acs"
          idp:
            entityId: "https://auth.kleff.ca/"
            singleSignOnService:
              url: "https://auth.kleff.ca/application/saml/kimai/sso/binding/redirect/"
            x509cert: ""
        mapping:
          - { saml: $http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress, kimai: 'email' }
          - { saml: $http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name, kimai: 'username' }
          - { saml: $http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name, kimai: 'alias' }