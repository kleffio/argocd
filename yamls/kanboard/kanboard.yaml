apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kanboard-data
  namespace: kanboard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanboard
  namespace: kanboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kanboard
  template:
    metadata:
      labels:
        app: kanboard
    spec:
      containers:
        - name: kanboard
          image: kanboard/kanboard:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /var/www/app/data
            - name: config
              mountPath: /var/www/app/config.php
              subPath: config.php
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kanboard-data
        - name: config
          configMap:
            name: kanboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: kanboard
  namespace: kanboard
spec:
  selector:
    app: kanboard
  ports:
    - port: 80
      targetPort: 80