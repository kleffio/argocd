apiVersion: batch/v1
kind: Job
metadata:
  name: kanboard-oauth2-setup-v4
  namespace: kanboard
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache sqlite >/dev/null 2>&1
              DB=/data/db.sqlite

              echo "Waiting for database to be initialized..."
              for i in $(seq 1 30); do
                if sqlite3 "$DB" "SELECT name FROM sqlite_master WHERE type='table' AND name='settings';" 2>/dev/null | grep -q settings; then
                  echo "Database ready."
                  break
                fi
                echo "Not ready yet, retrying in 5s..."
                sleep 5
              done

              echo "Writing OAuth2 settings..."
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_callback_url', 'https://kanboard.kleff.ca/oauth/callback');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_client_id', '1fdC80NQnA3g7oj2dtVMlYuRZwovRGB5xgHW4Zop');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_client_secret', 'i9JOBS5uyEWY94tvUNdV2mdxp7YBseV6WlxeXsB7GhAuwc0iKqu7uRWk2b04SVPJG8YgbLpyngzk0ebUdWFTqLClwiOUboEC5yKlXS2xjGWWmgpOK4uEIcZCfPRq0GAp');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_authorize_url', 'https://auth.kleff.ca/application/o/authorize/');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_token_url', 'https://auth.kleff.ca/application/o/token/');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_user_api_url', 'https://auth.kleff.ca/application/o/userinfo/');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_scopes', 'openid profile email');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_key_username', 'preferred_username');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_key_name', 'name');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_key_email', 'email');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_key_user_id', 'sub');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_account_creation', '1');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_email_domains', '');"
              sqlite3 "$DB" "INSERT OR REPLACE INTO settings (option, value) VALUES ('oauth2_groups_key', '');"
              echo "Done! OAuth2 settings written successfully."
              sqlite3 "$DB" "SELECT option, value FROM settings WHERE option LIKE 'oauth2%';"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kanboard-data
  backoffLimit: 3
