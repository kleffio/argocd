apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kimai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://robjuz.github.io/helm-charts/
    chart: kimai2
    targetRevision: "*"
    helm:
      valuesObject:
        kimai:
          adminEmail: admin@kleff.ca
          adminPassword: ""
          existingSecret: kimai-secrets
          existingSecretKey: adminPassword
          databasePassword: ""
        extraEnvs:
          - name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: kimai-secrets
                key: mariadb-password
        mariadb:
          enabled: true
          auth:
            existingSecret: kimai-secrets
            database: kimai
            username: kimai
          primary:
            persistence:
              enabled: true
              size: 5Gi
        persistence:
          enabled: true
          size: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: kimai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true