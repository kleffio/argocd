apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kimai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://robjuz.github.io/helm-charts/
    chart: kimai2
    targetRevision: "*"
    helm:
      valuesObject:
        replicaCount: 1
        image:
          repository: kimai/kimai2
          tag: "apache"
          pullPolicy: IfNotPresent
        kimaiAdminEmail: admin@kleff.ca
        kimaiAdminPasswordSecret: kimai-secrets
        ingress:
          enabled: false
          hostname: kimai.kleff.ca
        
        # We are moving away from the chart's config parameters because they are failing
        # Instead, we mount your "kimai-saml-config" directly into the path Kimai expects
        extraVolumes:
          - name: forced-saml-config
            configMap:
              name: kimai-saml-config
        extraVolumeMounts:
          - name: forced-saml-config
            mountPath: /opt/kimai/config/packages/local.yaml
            subPath: local.yaml
        
        extraEnvVars:
          - name: TRUSTED_HOSTS
            value: "^(localhost|kimai\\.kleff\\.ca)$"
          - name: KIMAI_SAML_ACTIVATE
            value: "true"
        
        mariadb:
          enabled: true
          auth:
            existingSecret: kimai-secrets
            database: kimai
            username: kimai
          primary:
            persistence:
              enabled: true
              size: 5Gi
        persistence:
          enabled: true
          size: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: kimai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true