apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kimai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://robjuz.github.io/helm-charts/
    chart: kimai2
    targetRevision: "*"
    helm:
      valuesObject:
        kimaiAdminEmail: admin@kleff.ca
        kimaiAdminPassword: ""
        kimaiAdminPasswordSecret: kimai-secrets
        ingress:
          enabled: false
          hostname: kimai.kleff.ca
        mariadb:
          enabled: true
          auth:
            existingSecret: kimai-secrets
            database: kimai
            username: kimai
          primary:
            persistence:
              enabled: true
              size: 5Gi
        persistence:
          enabled: true
          size: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: kimai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true