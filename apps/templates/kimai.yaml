apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kimai
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://robjuz.github.io/helm-charts/
      chart: kimai2
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/apps/templates/kimai.yaml 
        valuesObject:
          replicaCount: 1
          image:
            repository: kimai/kimai2
            tag: apache
          kimaiAdminEmail: admin@kleff.ca
          kimaiAdminPasswordSecret: kimai-secrets
          extraVolumes:
            - name: forced-saml-config
              configMap:
                name: kimai-saml-config
          extraVolumeMounts:
            - name: forced-saml-config
              mountPath: /opt/kimai/config/packages/local.yaml
              subPath: local.yaml
          extraEnvVars:
            - name: APP_URL
              value: "https://kimai.kleff.ca"
            - name: KIMAI_SAML_ACTIVATE
              value: "true"
            - name: KIMAI_REVERSE_PROXY_AUTH
              value: "true"
            - name: KIMAI_REVERSE_PROXY_USER_HEADER
              value: HTTP_X_AUTHENTIK_USERNAME
          mariadb:
            enabled: true
            auth:
              existingSecret: kimai-secrets
              database: kimai
    - repoURL: https://github.com/kleffio/argocd.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kimai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true