apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: "*"
    helm:
      valuesObject:
        authentik:
          secret_key: "$(AUTHENTIK_SECRET_KEY)"
          error_reporting:
            enabled: false
          postgresql:
            password: "$(AUTHENTIK_POSTGRESQL_PASSWORD)"
          redis:
            password: "$(AUTHENTIK_REDIS_PASSWORD)"
        server:
          replicas: 2
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secretKey
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: postgresqlPassword
            - name: AUTHENTIK_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: redisPassword
        worker:
          replicas: 2
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secretKey
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: postgresqlPassword
            - name: AUTHENTIK_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: redisPassword
        postgresql:
          enabled: true
          auth:
            existingSecret: authentik-secrets
            secretKeys:
              adminPasswordKey: postgresqlPassword
              userPasswordKey: postgresqlPassword
            database: authentik
            username: authentik
          primary:
            persistence:
              enabled: true
              size: 10Gi
        redis:
          enabled: true
          auth:
            enabled: true
            existingSecret: authentik-secrets
            existingSecretKey: redisPassword
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true