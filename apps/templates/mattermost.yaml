apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mattermost
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.mattermost.com
    chart: mattermost-team-edition
    targetRevision: "6.6.22"
    helm:
      valuesObject:
        replicaCount: 1
        image:
          tag: "6.6.0"
        service:
          type: ClusterIP
          port: 8065
        externalDB:
          enabled: true
          externalDriverType: "mysql"
          externalConnectionString: ""
        extraEnvVars:
          - name: MM_SQLSETTINGS_DATASOURCE
            valueFrom:
              secretKeyRef:
                name: mattermost-secrets
                key: mysql-dsn
        mysql:
          enabled: true
          mysqlUser: mattermost
          mysqlDatabase: mattermost
          existingSecret: mattermost-secrets
          persistence:
            enabled: true
            size: 10Gi
        persistence:
          data:
            enabled: true
            size: 10Gi
        config:
          MM_SERVICESETTINGS_SITEURL: "https://mattermost.kleff.ca"
        livenessProbe:
          initialDelaySeconds: 300
          timeoutSeconds: 5
          periodSeconds: 15
        readinessProbe:
          initialDelaySeconds: 300
          timeoutSeconds: 5
          periodSeconds: 15
  destination:
    server: https://kubernetes.default.svc
    namespace: mattermost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true