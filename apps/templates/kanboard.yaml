apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kanboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kleffio/argocd.git
    path: yamls/kanboard
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: kanboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true