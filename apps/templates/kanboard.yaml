apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanboard
  namespace: kanboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kanboard
  template:
    metadata:
      labels:
        app: kanboard
    spec:
      containers:
        - name: kanboard
          image: kanboard/kanboard:latest
          ports:
            - containerPort: 80
          # Added environment variables for Authentik SSO
          env:
            - name: KANBOARD_REVERSE_PROXY_AUTH
              value: "true"
            - name: KANBOARD_REVERSE_PROXY_USER_HEADER
              value: "X-authentik-username"
          volumeMounts:
            - name: data
              mountPath: /var/www/app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kanboard-data