apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mattermost-secrets
  namespace: mattermost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-secret-store
    kind: ClusterSecretStore
  target:
    name: mattermost-secrets
  data:
    - secretKey: mysqlPassword
      remoteRef:
        key: MATTERMOST_MYSQL_PASSWORD
    - secretKey: mysqlRootPassword
      remoteRef:
        key: MATTERMOST_MYSQL_ROOT_PASSWORD